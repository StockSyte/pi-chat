name: Sync upstream fork

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo sync StockSyte/pi-chat --source earendil-works/pi-chat --force
